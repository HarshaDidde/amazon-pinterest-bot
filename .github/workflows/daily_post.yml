# ─────────────────────────────────────────────────────────────────
#  .github/workflows/daily_post.yml
#
#  IMPORTANT: This file must live at  .github/workflows/daily_post.yml
#  inside your GitHub repository for Actions to pick it up.
#
#  Runs the Amazon → Pinterest bot DAILY at two times optimised for
#  US Pinterest peak traffic:
#    • 14:00 UTC  = 09:00 AM EST / 10:00 AM EDT  (morning planning window)
#    • 02:00 UTC  = 09:00 PM EST / 10:00 PM EDT  (peak evening scroll hour)
#
#  Required GitHub Secrets (repo → Settings → Secrets → Actions):
#    AMAZON_ASSOCIATE_TAG      — Amazon Associates US tag (e.g. "hd2170e-20")
#    PINTEREST_EMAIL           — Pinterest US account login email
#    PINTEREST_PASSWORD        — Pinterest US account login password
#    GOOGLE_SHEET_ID           — Google Sheet ID for deduplication log
#    GOOGLE_CREDENTIALS_JSON   — Full content of service-account JSON file
# ─────────────────────────────────────────────────────────────────

name: Daily Amazon → Pinterest Post

on:
  schedule:
    - cron: "0 14 * * *"    # 09:00 AM EST / 10:00 AM EDT — morning discovery
    - cron: "0 2  * * *"    # 09:00 PM EST / 10:00 PM EDT — peak evening scroll

  workflow_dispatch:          # Manual trigger from GitHub UI (for testing)

jobs:
  post-pins:
    runs-on: ubuntu-22.04
    timeout-minutes: 60       # 13 categories × retries — padded for safety

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium && playwright install-deps chromium

      - name: Run bot
        env:
          AMAZON_ASSOCIATE_TAG:     ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          GOOGLE_SHEET_ID:          ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          PINTEREST_EMAIL:          ${{ secrets.PINTEREST_EMAIL }}
          PINTEREST_PASSWORD:       ${{ secrets.PINTEREST_PASSWORD }}
          GOOGLE_AI_API_KEY:        ${{ secrets.GOOGLE_AI_API_KEY }}
        run: python main.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: "debug-*.png"
          if-no-files-found: ignore
          retention-days: 7
